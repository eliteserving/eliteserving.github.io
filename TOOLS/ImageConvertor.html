<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image to Base64 Converter</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f0f0f;
    color:#fff;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:900px;
    background:#1b1b1b;
    border-radius:18px;
    padding:25px;
    box-shadow:0 0 20px rgba(0,0,0,.5);
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.upload-box{
    border:2px dashed #555;
    border-radius:14px;
    padding:40px;
    text-align:center;
    cursor:pointer;
    transition:.3s;
    font-size:18px;
}

.upload-box:hover{
    border-color:#00ff99;
    background:#151515;
}

input[type=file]{
    display:none;
}

.preview{
    margin-top:25px;
    display:none;
    justify-content:center;
}

.preview img{
    max-width:100%;
    max-height:350px;
    border-radius:12px;
    border:1px solid #333;
}

textarea{
    width:100%;
    height:250px;
    margin-top:25px;
    resize:vertical;
    background:#111;
    color:#00ff99;
    border:1px solid #333;
    border-radius:12px;
    padding:15px;
    font-size:13px;
    word-break:break-all;
}

.stats{
    margin-top:20px;
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

.stat{
    flex:1;
    min-width:180px;
    background:#111;
    border-radius:10px;
    padding:12px;
    text-align:center;
}

button{
    width:100%;
    margin-top:18px;
    padding:15px;
    border:none;
    border-radius:12px;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
    color:#fff;
}

#copyBtn{
    background:#00aa66;
}

#copyBtn:hover{
    background:#00cc77;
}

#downloadBtn{
    background:#0077ff;
}

#downloadBtn:hover{
    background:#3399ff;
}

#clearBtn{
    background:#8b2d2d;
}

#clearBtn:hover{
    background:#a83d3d;
}
</style>

</head>
<body>

<div class="container">

<h1>Image to Base64 Converter</h1>

<label class="upload-box" for="fileInput">
    📁 Click to Upload Any Image
</label>

<input
type="file"
id="fileInput"
accept="image/*">

<div class="preview" id="preview">
    <img id="previewImg">
</div>

<textarea
id="output"
readonly
placeholder="Base64 data will appear here..."></textarea>

<div class="stats">

<div class="stat">
Characters
<br><br>
<span id="charCount">0</span>
</div>

<div class="stat">
Image Size
<br><br>
<span id="fileSize">0 KB</span>
</div>

<div class="stat">
Image Type
<br><br>
<span id="fileType">-</span>
</div>

</div>

<button id="copyBtn">Copy Base64</button>

<button id="downloadBtn">Download Base64 (.txt)</button>

<button id="clearBtn">Clear</button>

</div>

<script>

const fileInput=document.getElementById("fileInput");
const preview=document.getElementById("preview");
const previewImg=document.getElementById("previewImg");
const output=document.getElementById("output");

const charCount=document.getElementById("charCount");
const fileSize=document.getElementById("fileSize");
const fileType=document.getElementById("fileType");

const copyBtn=document.getElementById("copyBtn");
const downloadBtn=document.getElementById("downloadBtn");
const clearBtn=document.getElementById("clearBtn");

fileInput.addEventListener("change",()=>{

    const file=fileInput.files[0];

    if(!file) return;

    fileType.textContent=file.type || "Unknown";

    fileSize.textContent=(file.size/1024).toFixed(2)+" KB";

    const reader=new FileReader();

    reader.onload=function(e){

        const base64=e.target.result;

        preview.style.display="flex";
        previewImg.src=base64;

        output.value=base64;

        charCount.textContent=base64.length;

    };

    reader.onerror=function(){

        alert("Unable to read image.");

    };

    reader.readAsDataURL(file);

});

copyBtn.addEventListener("click",async()=>{

    if(output.value===""){
        alert("No Base64 available.");
        return;
    }

    try{

        await navigator.clipboard.writeText(output.value);

        copyBtn.textContent="Copied!";

        setTimeout(()=>{

            copyBtn.textContent="Copy Base64";

        },2000);

    }catch{

        alert("Copy failed.");

    }

});

downloadBtn.addEventListener("click",()=>{

    if(output.value===""){
        alert("Nothing to download.");
        return;
    }

    const blob=new Blob([output.value],{
        type:"text/plain"
    });

    const a=document.createElement("a");

    a.href=URL.createObjectURL(blob);

    a.download="image-base64.txt";

    document.body.appendChild(a);

    a.click();

    document.body.removeChild(a);

    URL.revokeObjectURL(a.href);

});

clearBtn.addEventListener("click",()=>{

    fileInput.value="";

    output.value="";

    preview.style.display="none";

    previewImg.src="";

    charCount.textContent="0";

    fileSize.textContent="0 KB";

    fileType.textContent="-";

});

</script>

</body>
</html>
