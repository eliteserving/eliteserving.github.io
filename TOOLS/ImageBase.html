<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Base Generator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,Segoe UI,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    padding:20px;
}

.container{
    width:100%;
    max-width:900px;
    background:rgba(255,255,255,.05);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,.1);
    border-radius:24px;
    padding:30px;
    box-shadow:0 20px 40px rgba(0,0,0,.4);
}

h1{
    text-align:center;
    color:#fff;
    margin-bottom:25px;
    font-size:2rem;
}

label{
    display:block;
    color:#cbd5e1;
    margin:15px 0 8px;
}

input,
textarea{
    width:100%;
    padding:14px;
    border:none;
    outline:none;
    border-radius:12px;
    background:#1e293b;
    color:white;
    font-size:15px;
}

input:focus,
textarea:focus{
    box-shadow:0 0 0 2px #3b82f6;
}

#Code{
    min-height:160px;
    resize:vertical;
}

.Spotted{
    min-height:260px;
    resize:vertical;
}

button{
    width:100%;
    margin-top:12px;
    padding:15px;
    border:none;
    border-radius:12px;
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-2px);
}

.Make{
    background:linear-gradient(135deg,#2563eb,#3b82f6);
}

.Make:hover{
    box-shadow:0 10px 25px rgba(59,130,246,.4);
}

.copy{
    background:linear-gradient(135deg,#16a34a,#22c55e);
}

.copy:hover{
    box-shadow:0 10px 25px rgba(34,197,94,.4);
}

.refresh{
    background:linear-gradient(135deg,#dc2626,#ef4444);
}

.refresh:hover{
    box-shadow:0 10px 25px rgba(239,68,68,.4);
}

.footer{
    text-align:center;
    margin-top:15px;
    color:#94a3b8;
    font-size:13px;
}
</style>
</head>

<body>

<div class="container">

    <h1>🖼️ IMAGE BASE GENERATOR</h1>

    <label>Variable Name</label>
    <input
        id="Name"
        type="text"
        placeholder="Example: Logo"
    >

    <label>Base64 Code</label>
    <textarea
        id="Code"
        placeholder="Paste your Base64 image code here..."
    ></textarea>

    <button class="Make">Generate</button>

    <button class="copy">Copy Output</button>

    <button class="refresh">Refresh / Clear</button>

    <label>Generated Code</label>
    <textarea
        class="Spotted"
        readonly
        placeholder="Generated code will appear here..."
    ></textarea>

    <div class="footer">
        Generate exportable JavaScript Base64 modules
    </div>

</div>

<script>

const Name = document.querySelector("#Name");
const Code = document.querySelector("#Code");
const Make = document.querySelector(".Make");
const Copy = document.querySelector(".copy");
const Refresh = document.querySelector(".refresh");
const Spotted = document.querySelector(".Spotted");

Make.addEventListener("click", () => {

    const variableName = Name.value.trim();
    const base64Code = Code.value.trim();

    if (!variableName) {
        alert("Enter a variable name");
        return;
    }

    if (!base64Code) {
        alert("Enter Base64 code");
        return;
    }

    Spotted.value =
`let ${variableName};

if (localStorage.getItem("Native")) {
  ${variableName}=" '${base64Code}' ";
} else {
  ${variableName}="${base64Code}";
};

export{${variableName}};`;

});

Copy.addEventListener("click", async () => {

    if (!Spotted.value.trim()) {
        alert("Generate code first");
        return;
    }

    try {

        await navigator.clipboard.writeText(Spotted.value);

        Copy.textContent = "Copied ✓";

        setTimeout(() => {
            Copy.textContent = "Copy Output";
        }, 2000);

    } catch {

        alert("Copy failed");

    }

});

Refresh.addEventListener("click", () => {

    Name.value = "";
    Code.value = "";
    Spotted.value = "";

    Name.focus();

});

</script>

</body>
</html>
