<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Import To Export Generator</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      background:#0f172a;
      color:white;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .container{
      width:100%;
      max-width:1000px;
      background:#1e293b;
      border-radius:20px;
      padding:25px;
      box-shadow:0 10px 30px rgba(0,0,0,0.4);
    }

    h1{
      text-align:center;
      margin-bottom:20px;
      font-size:32px;
    }

    p{
      text-align:center;
      margin-bottom:20px;
      color:#cbd5e1;
    }

    textarea{
      width:100%;
      height:300px;
      background:#0f172a;
      color:#fff;
      border:2px solid #334155;
      border-radius:12px;
      padding:15px;
      resize:none;
      outline:none;
      font-size:15px;
      line-height:1.5;
    }

    textarea:focus{
      border-color:#3b82f6;
    }

    .buttons{
      display:flex;
      gap:15px;
      margin-top:20px;
      flex-wrap:wrap;
    }

    button{
      flex:1;
      min-width:150px;
      padding:14px;
      border:none;
      border-radius:12px;
      cursor:pointer;
      font-size:16px;
      font-weight:bold;
      transition:0.3s;
    }

    .generate{
      background:#2563eb;
      color:white;
    }

    .generate:hover{
      background:#1d4ed8;
    }

    .copy{
      background:#16a34a;
      color:white;
    }

    .copy:hover{
      background:#15803d;
    }

    .clear{
      background:#dc2626;
      color:white;
    }

    .clear:hover{
      background:#b91c1c;
    }

    .output{
      margin-top:25px;
    }

    .output textarea{
      height:180px;
    }

    .label{
      margin-bottom:10px;
      font-size:18px;
      font-weight:bold;
      color:#93c5fd;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Import To Export Generator</h1>
    <p>Paste your imports and instantly generate the export statement.</p>

    <div>
      <div class="label">Paste Imports</div>
      <textarea id="imports" placeholder="Paste imports here..."></textarea>
    </div>

    <div class="buttons">
      <button class="generate" onclick="GENERATE()">Generate Export</button>
      <button class="copy" onclick="COPY()">Copy Output</button>
      <button class="clear" onclick="CLEARALL()">Reset Website</button>
    </div>

    <div class="output">
      <div class="label">Generated Export</div>
      <textarea id="output" readonly placeholder="Generated export will appear here..."></textarea>
    </div>
  </div>

  <script>

    function GENERATE(){
      const imports = document.getElementById("imports").value;

      // Match import names
      const matches = [...imports.matchAll(/import\s*\{\s*([^}]*)\s*\}/g)];

      let names = [];

      matches.forEach(match => {
        const extracted = match[1]
          .split(",")
          .map(item => item.trim())
          .filter(item => item !== "");

        names.push(...extracted);
      });

      // Remove duplicates
      names = [...new Set(names)];

      const result = `export{${names.join(",")}};`;

      document.getElementById("output").value = result;
    }

    function COPY(){
      const output = document.getElementById("output");
      const button = document.querySelector(".copy");

      if(output.value.trim() !== ""){
        output.select();
        output.setSelectionRange(0, 99999);

        navigator.clipboard.writeText(output.value)
        .then(() => {
          const originalText = button.innerText;

          button.innerText = "Copied";

          setTimeout(() => {
            button.innerText = originalText;
          }, 2000);
        });
      }
    }
    
    function CLEARALL(){
      document.getElementById("imports").value = "";
      document.getElementById("output").value = "";
    }

  </script>

</body>
</html>
